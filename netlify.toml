# Netlify 配置文件
[build]
  command = "npm run docs:build"
  publish = "docs/.vitepress/dist"
  base = "/"

[build.environment]
  NODE_ENV = "production"
  NODE_VERSION = "20"

[headers]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[redirects]
  from = "/*"
  to = "/index.html"
  status = 200
